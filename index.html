<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="./css/style.css">
        <link rel="icon" href="favico-n-roxo.ico">

        <title>NexStream</title>
    </head>
    <body>
        <main>
            <header>
                <img id="logo" src="../Logo-NexStream.png" alt="Logo do NexStream">
                <button id="theme-toggle" aria-label="Alternar tema" title="Alternar tema" aria-pressed="false">
                    <!-- Ícone lua (visível no tema escuro) -->
                    <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                    <!-- Ícone sol (visível no tema claro) -->
                    <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M6.76 4.84l-1.8-1.79L3.17 5.84l1.79 1.79 1.8-1.79zM1 13h3v-2H1v2zm10-9h2V1h-2v3zm7.03 2.05l1.79-1.79-1.79-1.79-1.79 1.79 1.79 1.79zM17 13v-2h3v2h-3zM12 7a5 5 0 100 10 5 5 0 000-10zm4.24 10.16l1.8 1.79 1.79-1.79-1.79-1.79-1.8 1.79zM11 23h2v-3h-2v3zM4.24 18.36l-1.79 1.79 1.79 1.79 1.8-1.79-1.8-1.79z"/>
                    </svg>
                </button>
            </header>
            
            <h1>Quem está assistindo?</h1>
            
            <section aria-label="Perfis Disponíveis">
            <nav class="profiles">   
                <ul class="profiles-outer">
                    <li>
                        <ul class="profiles" aria-label="Lista de perfis">
                            <li>
                                <a href="catalogo/catalogo.html" class="profile">
                                    <figure>
                                        <img src="./assets/perfil-1.jpg" alt="Uma personagem do jogo de video game Donkey Kong Country 2.">
                                        <figcaption>Dixie</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="catalogo/catalogo.html" class="profile">
                                    <figure>
                                        <img src="./assets/perfil-2.png" alt="Uma caricatura bem-humorada de um empresário careca e de barba cheia em seu escritório, usando óculos e terno azul.">
                                        <figcaption>João</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="catalogo/catalogo.html" class="profile">
                                    <figure>
                                        <img src="./assets/perfil-3.png" alt="Ilustração vibrante de uma streamer ruiva sorridente em seu setup gamer, segurando um controle de videogame ao lado de um gatinho.">
                                        <figcaption>May</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="catalogo/catalogo.html" class="profile">
                                    <figure>
                                        <img src="./assets/perfil-4.jpg" alt="Um personagem do jogo de video Super Mario World.">
                                        <figcaption>Mario</figcaption>
                                    </figure>
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </nav> 
            </section>
        </main>
        <script src="./js/index.js"></script>
    </body>
</html>
