<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="./css/style.css">
        <link rel="icon" href="favico-n-roxo.ico">

        <title>NexStream</title>
    </head>
    <body>
        <main>
            <header>
                <a href="index.html" class="logo-link" aria-label="NexStream">
                    <img src="./assets/logo-nexstream-black.png" alt="Logo NexStream" class="site-logo" id="logo">
                </a>
            </header>
            
            <h1>Quem está assistindo?</h1>
            
            <section aria-label="Perfis Disponíveis">
            <nav class="profiles">   
                <ul class="profiles-outer">
                    <li>
                        <ul class="profiles" aria-label="Lista de perfis">
                            <li>
                                <a href="catalogo/catalogo.html" class="profile">
                                    <figure>
                                        <img src="./assets/perfil-1.jpg" alt="Uma personagem do jogo de video game Donkey Kong Country 2.">
                                        <figcaption>Dixie</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="catalogo/catalogo.html" class="profile">
                                    <figure>
                                        <img src="./assets/perfil-2.png" alt="Uma caricatura bem-humorada de um empresário careca e de barba cheia em seu escritório, usando óculos e terno azul.">
                                        <figcaption>João</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="catalogo/catalogo.html" class="profile">
                                    <figure>
                                        <img src="./assets/perfil-3.png" alt="Ilustração vibrante de uma streamer ruiva sorridente em seu setup gamer, segurando um controle de videogame ao lado de um gatinho.">
                                        <figcaption>May</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="catalogo/catalogo.html" class="profile">
                                    <figure>
                                        <img src="./assets/perfil-4.jpg" alt="Um personagem do jogo de video Super Mario World.">
                                        <figcaption>Mario</figcaption>
                                    </figure>
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </nav> 
            </section>
        </main>
        <script src="./js/index.js"></script>
        <script>
            const logo = document.getElementById('logo');
            if (logo) {
                const prefix = window.location.pathname.startsWith('/nexstream') ? '/nexstream/' : './';
                logo.src = `${prefix}assets/logo-nexstream-black.png`;
            }
        </script>
    </body>
</html>
